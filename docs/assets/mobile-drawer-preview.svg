<svg width="1280" height="900" viewBox="0 0 1280 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="60" x2="1180" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F3EFE7"/>
      <stop offset="1" stop-color="#E5EDF3"/>
    </linearGradient>
    <linearGradient id="drawer" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFDF9"/>
      <stop offset="1" stop-color="#F8F6F0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#155E75"/>
    </linearGradient>
    <filter id="shadow" x="60" y="40" width="660" height="820" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#0F172A" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1280" height="900" rx="36" fill="url(#bg)"/>
  <rect x="0" y="0" width="1280" height="900" fill="#111827" opacity="0.10"/>

  <text x="780" y="180" fill="#0F172A" font-size="54" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">会话切换抽屉</text>
  <text x="780" y="232" fill="#475569" font-size="24" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">把重度操作收进左侧抽屉，主界面只专注聊天。</text>

  <g filter="url(#shadow)">
    <rect x="110" y="90" width="560" height="720" rx="36" fill="url(#drawer)"/>
    <text x="154" y="150" fill="#94A3B8" font-size="18" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" letter-spacing="0.16em">CODEX REMOTE</text>
    <text x="154" y="198" fill="#111827" font-size="36" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">会话切换</text>
    <rect x="564" y="126" width="68" height="32" rx="16" fill="#E2E8F0"/>
    <text x="584" y="147" fill="#475569" font-size="15" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">关闭</text>

    <rect x="146" y="236" width="488" height="118" rx="28" fill="#FFFFFF"/>
    <text x="176" y="278" fill="#94A3B8" font-size="16" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" letter-spacing="0.12em">当前会话</text>
    <text x="176" y="316" fill="#0F172A" font-size="28" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">Codex Remote</text>
    <text x="176" y="338" fill="#64748B" font-size="16" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">/workspace/codex-remote-pwa</text>
    <rect x="500" y="274" width="100" height="32" rx="16" fill="#DFF5EF"/>
    <text x="529" y="295" fill="#0F766E" font-size="15" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">空闲</text>

    <text x="146" y="408" fill="#0F172A" font-size="26" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">最近的 Codex</text>
    <text x="510" y="408" fill="#64748B" font-size="16" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">继续已有 thread</text>

    <rect x="146" y="438" width="488" height="90" rx="24" fill="#FFFFFF"/>
    <text x="176" y="476" fill="#0F172A" font-size="22" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">修复移动端聊天滚动问题</text>
    <text x="176" y="506" fill="#64748B" font-size="16" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">/workspace/codex-remote-pwa</text>
    <text x="548" y="488" fill="#0F766E" font-size="17" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">继续</text>

    <rect x="146" y="544" width="488" height="90" rx="24" fill="#FFFFFF"/>
    <text x="176" y="582" fill="#0F172A" font-size="22" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">补齐 app-server runtime</text>
    <text x="176" y="612" fill="#64748B" font-size="16" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">/workspace/codex-remote-pwa</text>
    <text x="548" y="594" fill="#1D4ED8" font-size="17" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">打开</text>

    <rect x="146" y="662" width="488" height="108" rx="28" fill="#FFFFFF"/>
    <text x="176" y="704" fill="#0F172A" font-size="24" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">连接设置</text>
    <text x="176" y="734" fill="#64748B" font-size="17" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">服务器地址、连接密码、新建会话入口都放在这里。</text>
  </g>

  <g transform="translate(780 356)">
    <rect width="380" height="162" rx="28" fill="#FFFFFF" opacity="0.82"/>
    <text x="32" y="48" fill="#0F172A" font-size="26" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">为什么用抽屉</text>
    <text x="32" y="90" fill="#334155" font-size="20" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">1. 不挤压聊天主视区</text>
    <text x="32" y="118" fill="#334155" font-size="20" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">2. 会话切换和配置都更集中</text>
  </g>

  <g transform="translate(780 560)">
    <rect width="380" height="136" rx="28" fill="#FFFFFF" opacity="0.82"/>
    <text x="32" y="50" fill="#0F172A" font-size="26" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">适合的内容</text>
    <text x="32" y="92" fill="#334155" font-size="20" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">- 最近会话</text>
    <text x="168" y="92" fill="#334155" font-size="20" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">- 已导入工作区</text>
  </g>
</svg>
