<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="160" y1="80" x2="1440" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6F1E8"/>
      <stop offset="1" stop-color="#E8EEF2"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F6F8FA"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#155E75"/>
    </linearGradient>
    <filter id="shadow" x="-40" y="-40" width="220" height="220" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <filter id="softShadow" x="-50" y="-50" width="520" height="280" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#1F2937"/>
    </marker>
  </defs>

  <rect width="1600" height="900" rx="40" fill="url(#bg)"/>
  <circle cx="1320" cy="140" r="160" fill="#D7EEE7"/>
  <circle cx="220" cy="760" r="220" fill="#E6E0D2"/>

  <text x="120" y="130" fill="#0F172A" font-size="54" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">Codex Remote PWA 架构概览</text>
  <text x="120" y="180" fill="#475569" font-size="24" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">本地 Codex 会话保留在你的电脑上，手机只是一个移动控制台。</text>

  <g filter="url(#shadow)" transform="translate(120 280)">
    <rect width="240" height="420" rx="44" fill="#111827"/>
    <rect x="14" y="14" width="212" height="392" rx="32" fill="url(#panel)"/>
    <rect x="48" y="26" width="144" height="18" rx="9" fill="#D1D5DB"/>
    <text x="38" y="98" fill="#0F172A" font-size="22" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">手机浏览器 / PWA</text>
    <text x="38" y="138" fill="#475569" font-size="17" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">继续对话</text>
    <text x="38" y="166" fill="#475569" font-size="17" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">切换会话</text>
    <text x="38" y="194" fill="#475569" font-size="17" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">查看最后输出</text>
    <text x="38" y="222" fill="#475569" font-size="17" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">处理授权请求</text>
    <rect x="34" y="280" width="144" height="44" rx="22" fill="url(#accent)"/>
    <text x="68" y="309" fill="#ECFEFF" font-size="18" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="600">Phone UI</text>
    <rect x="34" y="338" width="160" height="14" rx="7" fill="#D7DEE3"/>
    <rect x="34" y="364" width="120" height="14" rx="7" fill="#D7DEE3"/>
  </g>

  <g filter="url(#softShadow)" transform="translate(500 286)">
    <rect width="420" height="250" rx="28" fill="url(#panel)"/>
    <text x="34" y="58" fill="#0F172A" font-size="34" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">Bridge Server</text>
    <text x="34" y="96" fill="#475569" font-size="20" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">REST + WebSocket + SQLite</text>
    <rect x="34" y="126" width="156" height="40" rx="20" fill="#DCFCE7"/>
    <text x="62" y="152" fill="#166534" font-size="18" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="600">Session Store</text>
    <rect x="206" y="126" width="170" height="40" rx="20" fill="#DBEAFE"/>
    <text x="235" y="152" fill="#1D4ED8" font-size="18" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="600">Runtime Router</text>
    <rect x="34" y="184" width="342" height="26" rx="13" fill="#E2E8F0"/>
    <rect x="34" y="184" width="220" height="26" rx="13" fill="url(#accent)"/>
    <text x="34" y="232" fill="#64748B" font-size="16" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">统一会话、事件流、授权与移动端状态同步</text>
  </g>

  <g filter="url(#softShadow)" transform="translate(1020 226)">
    <rect width="440" height="184" rx="28" fill="url(#panel)"/>
    <text x="34" y="58" fill="#0F172A" font-size="30" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">Codex App Server</text>
    <text x="34" y="94" fill="#475569" font-size="20" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">官方 WebSocket 运行时</text>
    <text x="34" y="130" fill="#334155" font-size="18" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">支持：</text>
    <text x="96" y="130" fill="#334155" font-size="18" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">thread/start, turn/start, turn/interrupt</text>
  </g>

  <g filter="url(#softShadow)" transform="translate(1020 478)">
    <rect width="440" height="184" rx="28" fill="url(#panel)"/>
    <text x="34" y="58" fill="#0F172A" font-size="30" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">CLI Fallback</text>
    <text x="34" y="94" fill="#475569" font-size="20" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">codex exec --json / resume --json</text>
    <text x="34" y="130" fill="#334155" font-size="18" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">当 app-server 未配置时继续可用</text>
  </g>

  <path d="M392 492H470" stroke="#1F2937" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M928 382H988" stroke="#1F2937" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M928 542H988" stroke="#1F2937" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <text x="558" y="590" fill="#0F172A" font-size="18" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="600">你真正控制的是本地 Codex 会话，不是远程桌面窗口。</text>
</svg>
